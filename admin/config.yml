# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: Markyboy101/yogawithalessia
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/d7a7731f-e1fd-4779-929c-032a3a9205ac/pkce
  auth_token_endpoint: /sites/d7a7731f-e1fd-4779-929c-032a3a9205ac/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://yogawithalessia.com

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "schedule"
    label: "Class Schedule"
    description: "Edit the studio class times shown on the home page."
    files:
      - name: "schedule"
        label: "Studio Schedule"
        file: "assets/schedule.json"
        format: "json"
        fields:
          - label: "Heading"
            name: "title"
            widget: "string"
            default: "STUDIO SCHEDULE"
          - label: "Classes"
            name: "slots"
            label_singular: "Class"
            widget: "list"
            summary: "{{fields.day}} - {{fields.time}} {{fields.studio}}"
            fields:
              - { label: "Day", name: "day", widget: "string" }
              - { label: "Time(s)", name: "time", widget: "string" }
              - { label: "Studio", name: "studio", widget: "string" }
